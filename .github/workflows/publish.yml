# .github/workflows/publish.yml
#
# Builds the Quarto site on every push to `main` and publishes the rendered
# output to the `gh-pages` branch. GitHub Pages serves from that branch.
#
# Setup (one-time, in the GitHub repo UI):
#   1. Settings → Pages → "Build and deployment" → Source: Deploy from a branch.
#   2. Branch: gh-pages,  Folder: / (root).  Save.
#   3. Settings → Actions → General → Workflow permissions → Read and write.
#
# The first push will create the gh-pages branch automatically.

name: publish

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # required to push the gh-pages branch
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Quarto
        uses: quarto-dev/quarto-actions/setup@v2
        with:
          version: "1.5.57"

      - name: Render
        run: quarto render

      - name: Publish to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_site
          publish_branch: gh-pages
          force_orphan: true   # keep gh-pages branch small (no history)
